services:
  db:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: lmsource
      POSTGRES_PASSWORD: lmsource
      POSTGRES_DB: lmsource
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmsource"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
